<script>
/**
 * 【設定】GASのWebアプリURL
 * GAS側でデプロイした際に発行されるURLをここに貼り付ける
 */
const GAS_URL = "https://script.google.com/macros/s/AKfycbwUxpDdpnyOcF7UOxoxcoUaSZ0RyWd2TyFhPxbVzomEIjQJScJCMbqZIjokDCC7Hl501A/exec";

/**
 * ユーザー固有のIDを取得または生成する関数
 * ブラウザのlocalStorageに保存することで同じ端末(ブラウザ)からの二重投票を簡易的に防ぐ
 */
function ユーザーIDを取得する(){
    let id = localStorage.getItem("投票ユーザーID");
    if(!id){
        // IDがなければ新規作成（ランダムな英数字の羅列）
        id = crypto.randomUUID();
        localStorage.setItem("投票ユーザーID", id);
    }
    return id;
}

/**
 * 画面上のメッセージエリアにテキストを表示する共通関数
 */
function メッセージを表示する(text){
    document.getElementById("メッセージ").innerText = text;
}
function 投票完了画面を表示する(){

    document.querySelector(".フォーム").innerHTML = `
        <div style="text-align:center;">
            <h2>投票ありがとうございました！</h2>
            <p>投票は完了しています。</p>
        </div>
    `;
}
/**
 * メインの投票処理
 * 1. 選択チェック -> 2. 送信中表示 -> 3. GASへデータ送信 -> 4. 結果表示
 */
async function 投票する(){
    // 画面の選択値を取得
    const q1 = document.getElementById("q1").value;
    const q2 = document.getElementById("q2").value;
    const q3 = document.getElementById("q3").value;
    const q4 = document.getElementById("q4").value;
    const q5 = document.getElementById("q5").value;
    const q6 = document.getElementById("q6").value;
    const btn = document.getElementById("submitBtn");

    // 全ての項目が選ばれているか確認
    if(!q1 || !q2 || !q3 || !q4 || !q5 || !q6){
    メッセージを表示する("すべて選択してください");
    return;
    }

    // 二重送信を防ぐためボタンを無効化し、状態を表示
    btn.disabled = true;
    メッセージを表示する("送信中...");

// GASに送るためのURLを組み立て（クエリパラメータ形式）
// 注意: ユーザーIDも含めて送信することで、スプレッドシート側で重複チェックが可能
 const url = GAS_URL +
        "?ユーザーID=" + encodeURIComponent(ユーザーIDを取得する()) +
        "&q1=" + encodeURIComponent(q1) +
        "&q2=" + encodeURIComponent(q2) +
        "&q3=" + encodeURIComponent(q3) +
        "&q4=" + encodeURIComponent(q4) +
        "&q5=" + encodeURIComponent(q5) +
        "&q6=" + encodeURIComponent(q6);

    try {
        // GASへデータを送信
        const res = await fetch(url);
        const data = await res.json();
        const data = await res.json();
        if(data.結果 === "投票完了"){
            localStorage.setItem("投票済み", "true");
            投票完了画面を表示する();
        } else {
            メッセージを表示する(data.結果);
        }
    } catch (error) {
        // 通信失敗時の処理
        console.error(error);
        メッセージを表示する("送信に失敗しました。ネット環境を確認してください。");
        btn.disabled = false; // 失敗時は再試行できるようにボタンを戻す
    }
}
window.addEventListener("DOMContentLoaded", () => {

    if(localStorage.getItem("投票済み") === "true"){
        投票完了画面を表示する();
    }

});
</script>
